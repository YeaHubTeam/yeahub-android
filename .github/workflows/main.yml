name: Main Pipeline
on:
  pull_request:
    branches: '**'
  push:
    branches: ["develop"]

env:
  JAVA_VERSION: '21'

jobs:
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Run Ktlint from gradle
        run: |
          chmod +x ./gradlew
          ./gradlew consolidateKtlintReports

      - name: Upload Ktlint Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: build/reports/ktlint/ktlint-report.html

  detekt:
    runs-on: ubuntu-latest
    needs: ktlint
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: "Run Detekt from gradle"
        run: |
          chmod +x ./gradlew
          ./gradlew detekt

      - name: Upload Detekt Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/detekt-report.html

  test:
    runs-on: ubuntu-latest
    needs: detekt
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - run: |
          chmod +x ./gradlew
          ./gradlew test 

      - name: Upload test Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testReleaseUnitTest/index.html

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Build Debug Without Checks
        run: ./gradlew assembleDebug -x consolidateKtlintReports -x detekt -x test -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk