name: Main Pipeline
on:
  push:
    branches: [ "ANDROID-18,19,20-TEST" ]
  pull_request:
    branches: [ "ANDROID-18,19,20-TEST" ]

env:
  JAVA_VERSION: '21'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Make gradlew executable
        run: chmod +x gradlew
  ktlint:
    runs-on: ubuntu-latest
    needs: setup
    env:
      JAVA_HOME: ${{ needs.setup.outputs.java_home }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Java installation
        run: |
          # Check system Java
          java -version

          # Check specific JDK installation
          $JAVA_HOME/bin/java -version

          # Version check
          VERSION=$($JAVA_HOME/bin/java -version 2>&1 | head -1 | cut -d'"' -f2)
          if [[ ! "$VERSION" =~ ^21\. ]]; then
            echo "::error::Incorrect Java version: $VERSION"
            exit 1
          fi
          echo "✓ Correct Java version: $VERSION"
      - name: Run Detekt from gradle
        run: |
          chmod +x ./gradlew
          ./gradlew consolidateKtlintReports

      - name: Upload ktlint Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: /build/reports/ktlint/ktlint-report.html

  detekt:
    runs-on: ubuntu-latest
    needs: ktlint
    env:
      JAVA_HOME: ${{ needs.setup.outputs.java_home }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Java installation
        run: |
          # Check system Java
          java -version

          # Check specific JDK installation
          $JAVA_HOME/bin/java -version

          # Version check
          VERSION=$($JAVA_HOME/bin/java -version 2>&1 | head -1 | cut -d'"' -f2)
          if [[ ! "$VERSION" =~ ^21\. ]]; then
            echo "::error::Incorrect Java version: $VERSION"
            exit 1
          fi
          echo "✓ Correct Java version: $VERSION"
      - name: "Run Detekt from gradle"
        run: |
          chmod +x ./gradlew
          ./gradlew detekt

      - name: Upload ktlint Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: /build/reports/detekt/detekt-report.html

  test:
    runs-on: ubuntu-latest
    needs: detekt
    env:
      JAVA_HOME: ${{ needs.setup.outputs.java_home }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Java installation
        run: |
          # Check system Java
          java -version

          # Check specific JDK installation
          $JAVA_HOME/bin/java -version

          # Version check
          VERSION=$($JAVA_HOME/bin/java -version 2>&1 | head -1 | cut -d'"' -f2)
          if [[ ! "$VERSION" =~ ^21\. ]]; then
            echo "::error::Incorrect Java version: $VERSION"
            exit 1
          fi
          echo "✓ Correct Java version: $VERSION"
      - run: |
          chmod +x ./gradlew
          ./gradlew test 

      - name: Upload test Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testReleaseUnitTest/index.html

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      JAVA_HOME: ${{ needs.setup.outputs.java_home }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Java installation
        run: |
          # Check system Java
          java -version

          # Check specific JDK installation
          $JAVA_HOME/bin/java -version

          # Version check
          VERSION=$($JAVA_HOME/bin/java -version 2>&1 | head -1 | cut -d'"' -f2)
          if [[ ! "$VERSION" =~ ^21\. ]]; then
            echo "::error::Incorrect Java version: $VERSION"
            exit 1
          fi
          echo "✓ Correct Java version: $VERSION"
      - name: Build Debug Without Checks
        run: ./gradlew assembleDebug -x consolidateKtlintReports -x detekt -x test -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk