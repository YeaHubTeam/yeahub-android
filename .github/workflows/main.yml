name: Main Pipeline
on:
  push:
    branches: [ "ANDROID-18,19,20-TEST" ]
  pull_request:
    branches: [ "ANDROID-18,19,20-TEST" ]

jobs:
    ktlint:
      uses: ./.github/workflows/1_ktlint.yml
    detekt:
      needs: ktlint
      uses: ./.github/workflows/2_detekt.yml
    test:
      needs: detekt
      uses: ./.github/workflows/3_test.yml
    build:
      needs: test
      uses: ./.github/workflows/4_build.yml