name: "2. Detekt Stage"
on:
  push:
    branches: [ "ANDROID-18,19,20-TEST" ]
  pull_request:
    branches: [ "ANDROID-18,19,20-TEST" ]
  workflow_run:
    workflows: [ "1. Ktlint" ]
    types: [ completed ]


jobs:
  detekt:
    if: |
      github.event_name == 'workflow_call' || 
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: "Run Detekt from gradle"
        run: echo "Running detekt..."
          ./gradlew detekt

      - name: Upload ktlint Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/detekt-report.html

  subsequent_job:
    needs: detekt
    if: always() && needs.detekt.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - run: echo "This job only runs if detekt passed"